{% extends "base.html" %}
{% block content %}

<h2>Редагувати книгу: {{ book.name }}</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    
    <button type="submit" class="btn btn-primary">Зберегти зміни</button>
    <a href="/books/" class="btn btn-secondary">Скасувати</a>
</form>

{% endblock %}
