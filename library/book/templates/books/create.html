{% extends "base.html" %}
{% block content %}
{% comment %} <h2>Create Book (Librarian Only)</h2>
<form method="POST">
  {% csrf_token %}
  <input name="name" placeholder="Title" required><br><br>
  <input name="description" placeholder="Description"><br><br>
  <input name="count" type="number" placeholder="Count" min="1" required><br><br>
  <label>Select Authors (Hold Ctrl to select multiple):</label><br>
  <select name="authors" multiple required>
    {% for author in authors %}
    <option value="{{ author.id }}">{{ author.name }} {{ author.surname }}</option>
    {% endfor %}
  </select><br><br>
  <button type="submit">Create</button>
</form> {% endcomment %}
<h2>Додати нову книгу до бібліотеки</h2>

<form method="post">
    {% csrf_token %}
    
    {{ form.as_p }}
    
    <button type="submit" class="btn btn-success">Додати книгу</button>
    <a href="/books/" class="btn btn-secondary">Скасувати</a>
</form>
{% endblock %}
