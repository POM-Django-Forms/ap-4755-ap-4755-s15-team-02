{% extends "base.html" %}
{% block content %}
<h2>Create Order</h2>
{% if error %} <p style="color: red;">{{ error }}</p> {% endif %}
<form method="POST">
  {% csrf_token %}
  <label>Select Book:</label><br>
  <select name="book_id">
    {% for book in books %}
    <option value="{{ book.id }}" {% if selected_book == book.id %}selected{% endif %}>
      {{ book.name }}
    </option>
    {% endfor %}
  </select><br><br>
  <label>Planned End Date:</label><br>
  <input name="plated_end_at" type="datetime-local" required><br><br>
  <button type="submit">Create Order</button>
</form>
{% endblock %}
