{% extends "base.html" %}
{% block content %}
{% comment %} <h2>Create Author</h2>
<form method="POST">
  {% csrf_token %}
  <input name="name" placeholder="First Name" required><br><br>
  <input name="surname" placeholder="Last Name" required><br><br>
  <input name="patronymic" placeholder="Patronymic"><br><br>
  <button type="submit">Create</button>
</form> {% endcomment %}
<h2>Додати нового автора</h2>

<form method="post">
    {% csrf_token %}
    
    {{ form.as_p }}
    
    <button type="submit" class="btn btn-primary">Зберегти</button>
    <a href="/authors/" class="btn btn-secondary">Назад</a>
</form>
{% endblock %}
